<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Real Ding · Chad & Rebekah</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --terracotta:#C16A42; --terracotta-deep:#9A4E2C; --terracotta-soft:#E5A883;
    --clay:#D98B5F; --sun:#E8B24C; --sage:#8A9A6B; --sage-deep:#5E6E45;
    --cactus:#7CA05B; --dusk-purple:#9A8BB0; --espresso:#3A2E26; --ink:#4A3B30;
    --paper:#FBF6EE; --paper-warm:#F6ECDD; --paper-deep:#EFE2CE;
    --border:#E0D2BC; --text:#4A3B30; --text-muted:#8A7763;
  }
  html { scroll-behavior:smooth; }
  body {
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    background:var(--paper); color:var(--text); font-size:16px; line-height:1.7;
    letter-spacing:0.01em; min-height:100vh; display:flex; flex-direction:column;
  }
  .sky-wash { height:8px; background:linear-gradient(90deg,var(--sun),var(--terracotta-soft),var(--dusk-purple),var(--sage)); opacity:0.55; }
  nav {
    background:var(--paper-warm); border-bottom:1px solid var(--border);
    padding:0 2rem; display:flex; align-items:center; justify-content:space-between;
    flex-wrap:wrap; min-height:64px; position:sticky; top:0; z-index:100;
  }
  .nav-brand { font-family:Georgia,'Times New Roman',serif; font-size:18px; letter-spacing:0.06em; color:var(--terracotta-deep); text-decoration:none; white-space:nowrap; }
  .nav-brand span { color:var(--cactus); font-style:italic; }
  .nav-links { display:flex; gap:1.5rem; list-style:none; flex-wrap:wrap; }
  .nav-links a { text-decoration:none; font-size:12px; letter-spacing:0.09em; text-transform:uppercase; color:var(--text-muted); padding:0.5rem 0; border-bottom:2px solid transparent; transition:color 0.2s,border-color 0.2s; }
  .nav-links a:hover { color:var(--terracotta-deep); }
  .nav-links a.active { color:var(--terracotta-deep); border-bottom-color:var(--terracotta); }
  main { flex:1; }
  .page { max-width:760px; margin:0 auto; padding:3rem 2rem 5rem; }
  .invite-img { display:block; width:100%; max-width:760px; margin:0 auto 2rem; border:1px solid var(--border); border-radius:6px; }
  .eyebrow { font-size:11px; letter-spacing:0.16em; text-transform:uppercase; color:var(--terracotta); margin-bottom:0.85rem; }
  h1 { font-family:Georgia,'Times New Roman',serif; font-weight:normal; color:var(--espresso); line-height:1.1; }
  h2 { font-family:Georgia,'Times New Roman',serif; font-size:clamp(1.6rem,3.2vw,2.3rem); font-weight:normal; color:var(--espresso); line-height:1.2; margin-bottom:1.5rem; }
  h3 { font-family:Georgia,serif; font-weight:normal; color:var(--espresso); }
  p { margin-bottom:1rem; }
  .muted { color:var(--text-muted); }
  .arrows { text-align:center; color:var(--terracotta-soft); letter-spacing:0.35em; font-size:13px; margin:2.5rem 0; user-select:none; }
  a.link { color:var(--terracotta-deep); text-decoration:none; border-bottom:1px solid var(--terracotta-soft); }
  a.link:hover { color:var(--terracotta); }
  .hero { text-align:center; }
  .countdown { display:flex; gap:2.25rem; justify-content:center; margin-top:2.25rem; flex-wrap:wrap; }
  .cd-unit { text-align:center; min-width:56px; }
  .cd-num { font-family:Georgia,serif; font-size:2.5rem; color:var(--terracotta-deep); display:block; line-height:1; }
  .cd-label { font-size:10px; letter-spacing:0.12em; text-transform:uppercase; color:var(--text-muted); margin-top:8px; display:block; }
  .cta-row { display:flex; gap:1rem; justify-content:center; flex-wrap:wrap; margin-top:2.25rem; }
  .btn { display:inline-block; padding:0.7rem 1.85rem; border:1.5px solid var(--terracotta); color:var(--terracotta-deep); background:transparent; text-decoration:none; font-size:13px; letter-spacing:0.08em; text-transform:uppercase; border-radius:3px; cursor:pointer; transition:background 0.2s,color 0.2s; font-family:inherit; }
  .btn:hover { background:var(--terracotta); color:var(--paper); }
  .btn-primary { background:var(--terracotta); color:var(--paper); }
  .btn-primary:hover { background:var(--terracotta-deep); border-color:var(--terracotta-deep); }
  .info-block { background:var(--paper-warm); border:1px solid var(--border); border-radius:6px; padding:1.5rem 1.75rem; margin-bottom:1.5rem; }
  .info-block h3 { font-size:1.15rem; margin-bottom:0.6rem; }
  .info-block p { font-size:15px; color:var(--ink); margin-bottom:0.6rem; }
  .day-block { margin-bottom:2.5rem; }
  .day-head { display:flex; align-items:baseline; gap:1rem; margin-bottom:0.25rem; flex-wrap:wrap; }
  .day-date { font-size:12px; letter-spacing:0.12em; text-transform:uppercase; color:var(--text-muted); }
  .day-title { font-family:Georgia,serif; font-size:1.6rem; color:var(--terracotta-deep); }
  .day-where { font-size:14px; color:var(--ink); margin:0.5rem 0 0.25rem; }
  .day-dress { font-size:12px; letter-spacing:0.08em; text-transform:uppercase; color:var(--sage-deep); margin-bottom:1rem; }
  .sched { list-style:none; border-left:2px solid var(--terracotta-soft); margin-left:6px; padding-left:1.5rem; }
  .sched li { position:relative; padding:0.4rem 0; font-size:15px; color:var(--ink); }
  .sched li::before { content:''; position:absolute; left:-1.5rem; top:0.95rem; transform:translateX(-52%); width:8px; height:8px; border-radius:50%; background:var(--terracotta); }
  .sched .time { display:inline-block; min-width:92px; color:var(--terracotta-deep); font-weight:500; }
  .gift-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:1.25rem; margin-top:1.5rem; }
  .gift-card { background:var(--paper-warm); border:1px solid var(--border); border-radius:6px; padding:1.5rem; }
  .gift-card h3 { font-size:1.15rem; margin-bottom:0.5rem; }
  .gift-card p { font-size:14px; color:var(--ink); margin-bottom:0.3rem; }
  .gift-card .detail { font-family:'SF Mono',Menlo,monospace; font-size:13px; color:var(--terracotta-deep); background:var(--paper); padding:0.5rem 0.7rem; border-radius:4px; border:1px solid var(--border); margin-top:0.6rem; word-break:break-word; }
  .photo-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(160px,1fr)); gap:1rem; margin:1.5rem 0; }
  .photo-ph { aspect-ratio:4/3; background:var(--paper-deep); border:1px dashed var(--border); border-radius:6px; display:flex; align-items:center; justify-content:center; color:var(--text-muted); font-size:13px; text-align:center; padding:1rem; }
  .form-row { margin-bottom:1.3rem; }
  .form-row label { display:block; font-size:11px; letter-spacing:0.1em; text-transform:uppercase; color:var(--text-muted); margin-bottom:0.45rem; }
  .form-row input, .form-row select, .form-row textarea { width:100%; padding:0.65rem 0.9rem; border:1px solid var(--border); border-radius:4px; background:var(--paper); color:var(--text); font-size:15px; font-family:inherit; appearance:none; outline:none; transition:border-color 0.2s,box-shadow 0.2s; }
  .form-row input:focus, .form-row select:focus, .form-row textarea:focus { border-color:var(--terracotta); box-shadow:0 0 0 3px rgba(193,106,66,0.12); }
  .form-row textarea { min-height:84px; resize:vertical; }
  .form-grid { display:grid; grid-template-columns:1fr 1fr; gap:1rem; }
  .plus-one-note { font-size:13px; color:var(--text-muted); margin:-0.5rem 0 1.3rem; }
  .rsvp-success { display:none; background:var(--paper-warm); border:1px solid var(--border); border-radius:6px; padding:2.5rem 2rem; text-align:center; }
  .rsvp-success h3 { font-size:1.5rem; margin-bottom:0.5rem; color:var(--terracotta-deep); }
  .faq-item { border-top:1px solid var(--border); padding:1.25rem 0; }
  .faq-item:last-child { border-bottom:1px solid var(--border); }
  .faq-q { font-size:16px; font-weight:500; color:var(--espresso); cursor:pointer; display:flex; justify-content:space-between; align-items:center; gap:1rem; user-select:none; }
  .faq-q::after { content:'+'; font-size:20px; color:var(--terracotta); }
  .faq-item.open .faq-q::after { content:'\2212'; }
  .faq-a { display:none; padding-top:0.75rem; font-size:15px; color:var(--ink); }
  .faq-item.open .faq-a { display:block; }
  footer { background:var(--espresso); color:var(--paper-deep); text-align:center; padding:3rem 2rem; font-size:13px; letter-spacing:0.04em; }
  footer .f-names { font-family:Georgia,serif; font-size:1.5rem; color:var(--terracotta-soft); margin-bottom:0.4rem; }
  footer .f-arrows { color:var(--clay); letter-spacing:0.3em; margin:0.75rem 0; opacity:0.7; }
  @media (max-width:640px) {
    nav { padding:0.75rem 1.25rem; }
    .nav-links { gap:0.9rem; width:100%; }
    .nav-links a { font-size:11px; }
    .page { padding:2rem 1.25rem 4rem; }
    .form-grid { grid-template-columns:1fr; }
    .countdown { gap:1.5rem; }
    .sched .time { display:block; min-width:0; }
  }
</style>
</head>
